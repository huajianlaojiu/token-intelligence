name: Daily Data Update

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update pricing data
        run: node scripts/update-pricing.js
      - name: Commit and push if changed
        run: |
          git config user.name "Token Bot"
          git config user.email "bot@tokenintelligence.dev"
          git add data.json
          git diff --staged --quiet || (git commit -m "Auto-update: refresh token pricing data [skip ci]" && git push)